apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: data
  labels:
    app.kubernetes.io/name: spark
    app.kubernetes.io/component: master
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spark
      app.kubernetes.io/component: master
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark
        app.kubernetes.io/component: master
    spec:
      serviceAccountName: spark
      containers:
        - name: spark-master
          image: bitnami/spark:3.5.5
          imagePullPolicy: IfNotPresent
          env:
            - name: SPARK_MODE
              value: master
            - name: SPARK_RPC_AUTHENTICATION_ENABLED
              value: "no"
            - name: SPARK_RPC_ENCRYPTION_ENABLED
              value: "no"
            - name: SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED
              value: "no"
            - name: SPARK_SSL_ENABLED
              value: "no"
            - name: SPARK_MASTER_HOST
              value: spark-master
          ports:
            - name: cluster
              containerPort: 7077
            - name: web
              containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: data
  labels:
    app.kubernetes.io/name: spark
    app.kubernetes.io/component: master
spec:
  selector:
    app.kubernetes.io/name: spark
    app.kubernetes.io/component: master
  ports:
    - name: cluster
      port: 7077
      targetPort: cluster
    - name: web
      port: 8080
      targetPort: web
