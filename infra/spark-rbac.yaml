apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: data
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark
  namespace: data
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark
  namespace: data
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: data
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark
